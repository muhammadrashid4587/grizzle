version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - unparam

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # Test files get a little more latitude
    - path: _test\.go
      linters:
        - errcheck
        - unparam
