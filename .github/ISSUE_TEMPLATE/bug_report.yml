name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "e.g. go1.22.3"
    validations:
      required: true

  - type: input
    id: grizzle-version
    attributes:
      label: Grizzle version / commit
      placeholder: "e.g. v0.3.1 or abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Schema definition + query builder code + expected vs. actual SQL output.
      render: go
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
